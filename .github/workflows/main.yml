---
name: ci

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Mark repository as safe for Git
      run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"

    - name: Show build environment
      run: |
        echo "DEVKITPRO=$DEVKITPRO"
        echo "DEVKITARM=$DEVKITARM"
        echo "DEVKITA64=$DEVKITA64"

        echo
        echo "Repository commit:"
        git rev-parse HEAD

        echo
        echo "Submodules:"
        git submodule status

        echo
        echo "Available package manager:"
        command -v dkp-pacman || true
        command -v pacman || true

        echo
        echo "devkitPro package query:"
        if command -v dkp-pacman >/dev/null 2>&1; then
          dkp-pacman -Q libnx devkitA64 switch-tools || true
          dkp-pacman -Qi libnx || true
        elif command -v pacman >/dev/null 2>&1; then
          pacman -Q libnx devkitA64 switch-tools || true
          pacman -Qi libnx || true
        else
          echo "No pacman/dkp-pacman found in PATH."
        fi

        echo
        echo "libnx files:"
        ls -la "$DEVKITPRO/libnx" || true
        ls -la "$DEVKITPRO/libnx/include/switch.h" || true

    - name: Save build info
      run: |
        {
          echo "Build date: $(date -u)"
          echo
          echo "Repository commit:"
          git rev-parse HEAD
          echo
          echo "Submodules:"
          git submodule status
          echo
          echo "Environment:"
          echo "DEVKITPRO=$DEVKITPRO"
          echo "DEVKITARM=$DEVKITARM"
          echo "DEVKITA64=$DEVKITA64"

          echo
          echo "Available package manager:"
          command -v dkp-pacman || true
          command -v pacman || true

          echo
          echo "devkitPro package query:"
          if command -v dkp-pacman >/dev/null 2>&1; then
            dkp-pacman -Q libnx devkitA64 switch-tools || true
            echo
            echo "Full libnx package info:"
            dkp-pacman -Qi libnx || true
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Q libnx devkitA64 switch-tools || true
            echo
            echo "Full libnx package info:"
            pacman -Qi libnx || true
          else
            echo "No pacman/dkp-pacman found in PATH."
          fi

          echo
          echo "libnx directory:"
          ls -la "$DEVKITPRO/libnx" || true

          echo
          echo "libnx include directory:"
          ls -la "$DEVKITPRO/libnx/include" | head -100 || true

          echo
          echo "libnx library directory:"
          ls -la "$DEVKITPRO/libnx/lib" || true
        } > build-info.txt

        cat build-info.txt

    - name: Build
      run: |
        make clean
        make -j$(nproc)

    - name: Generate checksum
      run: |
        sha256sum ovlSysmodules.ovl > ovlSysmodules.ovl.sha256
        cat ovlSysmodules.ovl.sha256

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ovlSysmodules
        path: |
          ovlSysmodules.ovl
          ovlSysmodules.ovl.sha256
          build-info.txt
