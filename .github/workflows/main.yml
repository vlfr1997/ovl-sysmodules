---
name: ci

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64

    steps:
    - name: Checkout project
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Build project
      run: make

    - name: Generate checksum
      run: sha256sum ovlSysmodules.ovl > ovlSysmodules.ovl.sha256

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        path: |
          ovlSysmodules.ovl
          ovlSysmodules.ovl.sha256
