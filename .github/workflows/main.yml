---
name: ci

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Mark repository as safe for Git
      run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"

    - name: Show build environment
      run: |
        echo "DEVKITPRO=$DEVKITPRO"
        echo "DEVKITARM=$DEVKITARM"
        echo "DEVKITA64=$DEVKITA64"

        echo
        echo "Repository commit:"
        git rev-parse HEAD

        echo
        echo "Submodules:"
        git submodule status

        echo
        echo "pacman package query:"
        pacman -Q libnx devkitA64 switch-tools || true

        echo
        echo "Searching installed devkitPro packages:"
        pacman -Q | grep -Ei 'libnx|devkit|switch' || true

        echo
        echo "libnx files:"
        ls -la "$DEVKITPRO/libnx" || true
        ls -la "$DEVKITPRO/libnx/include/switch.h" || true

        echo
        echo "libnx version macros:"
        grep -R "VERSION" "$DEVKITPRO/libnx/include/switch/kernel/firmware.h" "$DEVKITPRO/libnx/include/switch.h" "$DEVKITPRO/libnx/include" 2>/dev/null | head -50 || true

    - name: Save build info
      run: |
        {
          echo "Build date: $(date -u)"
          echo
          echo "Repository commit:"
          git rev-parse HEAD
          echo
          echo "Submodules:"
          git submodule status
          echo
          echo "Environment:"
          echo "DEVKITPRO=$DEVKITPRO"
          echo "DEVKITARM=$DEVKITARM"
          echo "DEVKITA64=$DEVKITA64"
          echo
          echo "pacman package query:"
          pacman -Q libnx devkitA64 switch-tools || true
          echo
          echo "Searching installed devkitPro packages:"
          pacman -Q | grep -Ei 'libnx|devkit|switch' || true
          echo
          echo "Full libnx package info:"
          pacman -Qi libnx || true
          echo
          echo "libnx directory:"
          ls -la "$DEVKITPRO/libnx" || true
          echo
          echo "libnx include directory:"
          ls -la "$DEVKITPRO/libnx/include" | head -100 || true
          echo
          echo "libnx version-related macros:"
          grep -R "VERSION" "$DEVKITPRO/libnx/include" 2>/dev/null | head -100 || true
        } > build-info.txt

        cat build-info.txt

    - name: Build
      run: |
        make clean
        make -j$(nproc)

    - name: Generate checksum
      run: |
        sha256sum ovlSysmodules.ovl > ovlSysmodules.ovl.sha256
        cat ovlSysmodules.ovl.sha256

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ovlSysmodules
        path: |
          ovlSysmodules.ovl
          ovlSysmodules.ovl.sha256
          build-info.txt
