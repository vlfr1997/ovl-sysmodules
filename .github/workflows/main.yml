name: Build ovlSysmodules

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
      - "rebuild-*"
      - "libnx-rebuild-*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Mark repository as safe for Git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Show build environment
        run: |
          echo "DEVKITPRO=$DEVKITPRO"
          echo "DEVKITARM=$DEVKITARM"
          echo "DEVKITA64=$DEVKITA64"

          echo
          echo "Repository commit:"
          git rev-parse HEAD

          echo
          echo "Submodules:"
          git submodule status

          echo
          echo "libnx files:"
          ls -la "$DEVKITPRO/libnx" || true
          ls -la "$DEVKITPRO/libnx/include/switch.h" || true

          echo
          echo "libnx library directory:"
          ls -la "$DEVKITPRO/libnx/lib" || true

      - name: Build
        run: |
          make clean
          make -j$(nproc)

      - name: Generate checksum
        run: |
          sha256sum ovlSysmodules.ovl > ovlSysmodules.ovl.sha256
          cat ovlSysmodules.ovl.sha256

      - name: Generate release notes
        run: |
          {
            echo "## Source"
            echo
            echo "- Repository commit: \`$(git rev-parse HEAD)\`"
            echo
            echo "### Submodules"
            echo
            git submodule status | awk '{print "- `" $1 "` " $2 " " $3}'
            echo
            echo "## Dependency versions"
            echo
            echo "- libnx: 4.12.0-1"
            echo "- devkitA64: r29.2-1"
            echo "- switch-tools: 1.13.1-1"
            echo
            echo "## Files"
            echo
            echo "- \`ovlSysmodules.ovl\`"
            echo "- \`ovlSysmodules.ovl.sha256\`"
            echo "- \`release-notes.md\`"
            echo
            echo "## SHA256"
            echo
            echo "\`\`\`text"
            cat ovlSysmodules.ovl.sha256
            echo "\`\`\`"
          } > release-notes.md

          cat release-notes.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ovlSysmodules
          path: |
            ovlSysmodules.ovl
            ovlSysmodules.ovl.sha256
            release-notes.md

      - name: Upload files to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            ovlSysmodules.ovl
            ovlSysmodules.ovl.sha256
            release-notes.md