---
name: ci

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Show build environment
      run: |
        echo "DEVKITPRO=$DEVKITPRO"
        echo "DEVKITARM=$DEVKITARM"
        echo "DEVKITA64=$DEVKITA64"

        echo
        echo "Repository commit:"
        git rev-parse HEAD

        echo
        echo "Submodules:"
        git submodule status

        echo
        echo "devkitPro packages:"
        pacman -Q libnx devkitA64 switch-tools || true

    - name: Save build info
      run: |
        {
          echo "Build date: $(date -u)"
          echo
          echo "Repository commit:"
          git rev-parse HEAD
          echo
          echo "Submodules:"
          git submodule status
          echo
          echo "Environment:"
          echo "DEVKITPRO=$DEVKITPRO"
          echo "DEVKITARM=$DEVKITARM"
          echo "DEVKITA64=$DEVKITA64"
          echo
          echo "devkitPro packages:"
          pacman -Q libnx devkitA64 switch-tools || true
          echo
          echo "Full libnx package info:"
          pacman -Qi libnx || true
        } > build-info.txt

        cat build-info.txt

    - name: Build
      run: |
        make clean
        make -j$(nproc)

    - name: Generate checksum
      run: |
        sha256sum ovlSysmodules.ovl > ovlSysmodules.ovl.sha256
        cat ovlSysmodules.ovl.sha256

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ovlSysmodules
        path: |
          ovlSysmodules.ovl
          ovlSysmodules.ovl.sha256
          build-info.txt
